<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Flow2API Worker</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 300px; margin: 0; padding: 18px; background: #0f1115; color: #e8eaed; text-align: center; }
    h1 { font-size: 15px; margin: 0 0 14px; font-weight: 600; }
    #statusBig { font-size: 15px; font-weight: 600; padding: 14px 10px; border-radius: 10px; background: #161922; border: 1px solid #2a2f3a; line-height: 1.35; }
    #statusBig.connected { color: #46d369; border-color: #22432b; background: #10231a; }
    #statusBig.disconnected { color: #f0b562; border-color: #4a3a1f; background: #241d10; }
    #statusBig.checking { color: #9aa0a6; }
    .note { font-size: 12px; color: #b6bcc4; margin: 14px 2px 0; line-height: 1.5; }
    .note b { color: #e8eaed; }
    button { margin-top: 16px; width: 100%; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: #3b6cf6; color: #fff; }
    details { margin-top: 16px; text-align: left; }
    summary { font-size: 11px; color: #6b7280; cursor: pointer; outline: none; }
    .logs { margin-top: 8px; max-height: 150px; overflow: auto; background: #0b0d12; border: 1px solid #2a2f3a; border-radius: 8px; padding: 8px; font-size: 10.5px; line-height: 1.5; }
    .logs .l-SUCCESS { color: #46d369; } .logs .l-ERROR { color: #f06262; } .logs .l-INFO, .logs .l-WARN { color: #9aa0a6; }
  </style>
</head>
<body>
  <h1>Flow2API Worker</h1>

  <div id="statusBig" class="checking">Checking…</div>

  <p class="note">Runs automatically. <b>Just keep this Chrome signed in to Google&nbsp;Labs.</b><br />Nothing to set up.</p>

  <button id="reconnectBtn">Reconnect</button>

  <details>
    <summary>Details (for support)</summary>
    <div class="logs" id="logs"></div>
  </details>

  <script src="options.js"></script>
</body>
</html>
